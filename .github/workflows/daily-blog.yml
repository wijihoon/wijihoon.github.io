name: Daily Trend Blog

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run agent team
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          pip install -r requirements.txt
          python bot/main.py

      - name: Commit & push posts
        run: |
          git config user.name "trend-bot"
          git config user.email "bot@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "auto: daily posts $(date +%F)"
          git push
