name: Daily Trend Blog

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run agent team
        env:
          PYTHONUNBUFFERED: "1"
          # LLM (있는 것만 사용 — Cerebras 권장)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEO: "KR,US"
          EN_POSTS: "1"
          # 한국 채널/수익화
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REFRESH_TOKEN: ${{ secrets.NAVER_REFRESH_TOKEN }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          ADSENSE_CLIENT: "ca-pub-6340177904204536"
          ADFIT_UNIT: ${{ secrets.ADFIT_UNIT }}
          ADFIT_UNIT2: ${{ secrets.ADFIT_UNIT2 }}
          # 영어 채널/수익화
          BLOGGER_BLOG_ID_EN: ${{ secrets.BLOGGER_BLOG_ID_EN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          # 이미지
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # 배포
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install -r requirements.txt
          PYTHONPATH=bot python bot/main.py

      - name: Commit & push posts
        run: |
          git config user.name "trend-bot"
          git config user.email "bot@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "auto: daily posts $(date +%F)"
          git push